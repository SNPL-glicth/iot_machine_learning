# ════════════════════════════════════════════════════════════════════
# ZENIN IoT System — Docker Compose
# Servicios: ML Service + Redis
# Uso: docker compose -f iot_machine_learning/docker-compose.yml up
# ════════════════════════════════════════════════════════════════════

version: '3.8'

services:
  zenin-ml:
    build:
      context: ..
      dockerfile: iot_machine_learning/Dockerfile
    container_name: zenin-ml-service
    ports:
      - "8002:8002"
    environment:
      - PYTHONPATH=/app
      - ML_ENV=production
      - ML_LOG_LEVEL=${ML_LOG_LEVEL:-INFO}
      - ML_COMPLIANCE_BASE_DIR=/var/lib/zenin/compliance
      - REDIS_URL=redis://redis:6379/0
      - ZENIN_DB_HOST=${ZENIN_DB_HOST:-db}
      - ZENIN_DB_PORT=${ZENIN_DB_PORT:-1433}
      - ZENIN_DB_NAME=${ZENIN_DB_NAME:-zenin_db}
      - ZENIN_DB_USER=${ZENIN_DB_USER:-sa}
      - ZENIN_DB_PASSWORD=${ZENIN_DB_PASSWORD:?ZENIN_DB_PASSWORD is required}
    env_file:
      - .env
    volumes:
      - zenin_compliance_data:/var/lib/zenin/compliance
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: zenin-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  weaviate:
    image: semitechnologies/weaviate:1.24.1
    container_name: zenin-weaviate
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'text2vec-transformers'
      ENABLE_MODULES: 'text2vec-transformers'
      TRANSFORMERS_INFERENCE_API: 'http://t2v-transformers:8080'
    volumes:
      - zenin_weaviate_data:/var/lib/weaviate
    depends_on:
      t2v-transformers:
        condition: service_healthy
    restart: unless-stopped

  t2v-transformers:
    image: semitechnologies/transformers-inference:sentence-transformers-paraphrase-multilingual-MiniLM-L12-v2
    container_name: zenin-t2v-transformers
    environment:
      ENABLE_CUDA: '0'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/.well-known/ready"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

volumes:
  zenin_compliance_data:
  zenin_weaviate_data:
